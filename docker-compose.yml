version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dra
      POSTGRES_PASSWORD: dra
      POSTGRES_DB: dra
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

volumes:
  pgdata:
  qdrantdata:
